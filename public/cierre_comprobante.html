<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>EXR — Comprobante de cierre</title>
  <link rel="stylesheet" href="/css/exr_ui.css" />
  <style>
    .cc-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
      margin-top:14px;
    }

    .cc-kv{
      display:grid;
      grid-template-columns:180px 1fr;
      gap:8px 12px;
      font-size:14px;
    }

    .cc-label{
      color:var(--muted);
    }

    @media (max-width: 900px){
      .cc-grid{ grid-template-columns:1fr; }
      .cc-kv{ grid-template-columns:1fr; }
    }

    @media print{
      body{
        background:#fff !important;
        color:#111 !important;
      }

      .exr-pro-wrap{
        max-width:none;
        margin:0;
        padding:0;
      }

      .exr-pro-topbar .exr-pro-row{
        display:none !important;
      }

      .exr-pro-card,
      .exr-pro-topbar{
        box-shadow:none !important;
        background:#fff !important;
        border:1px solid #ccc !important;
      }

      .exr-muted,
      .cc-label,
      .exr-pro-subtitle{
        color:#555 !important;
      }

      .exr-pro-pill,
      .badge,
      .pill{
        border:1px solid #999 !important;
        color:#111 !important;
        background:#fff !important;
      }

      a{
        color:#111 !important;
        text-decoration:none !important;
      }
    }
  </style>
</head>
<body>
  <div class="exr-pro-wrap">
    <header class="exr-pro-topbar">
      <div class="exr-pro-brand">
        <div class="exr-pro-logo">
          <img src="/assets/exr_logo.png" alt="EXR" />
        </div>
        <div style="min-width:0;">
          <h1 class="exr-pro-title">Comprobante de cierre</h1>
          <div class="exr-pro-subtitle" id="sub">Cargando…</div>
        </div>
      </div>

      <div class="exr-pro-row">
        <button class="exr-pro-btn" id="btnVolver">Volver</button>
        <button class="exr-pro-btn" id="btnPrint">Imprimir</button>
      </div>
    </header>

    <section class="cc-grid">
      <div class="exr-pro-card">
        <h2 class="exr-pro-section-title">Datos del cierre</h2>
        <div class="cc-kv" id="kv"></div>
      </div>

      <div class="exr-pro-card">
        <h2 class="exr-pro-section-title">Resumen</h2>
        <div class="exr-pro-row" id="resumenPills"></div>
      </div>
    </section>

    <section class="exr-pro-card" style="margin-top:14px;">
      <h2 class="exr-pro-section-title">Detalle de guías</h2>
      <div id="detalleBox"></div>
    </section>
  </div>

  <script src="/cierre_comprobante.js?v=1"></script>
</body>
</html>
