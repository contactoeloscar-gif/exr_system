<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>EXR — Bandeja</title>
  <link rel="stylesheet" href="/css/exr_ui.css" />
  <style>
    .bandeja-card{ margin-top:14px; }
    .bandeja-head-note{ color:var(--muted); font-size:12px; }
    .bandeja-filters{
      display:grid;
      grid-template-columns: 1.3fr 1fr 1fr 1fr auto;
      gap:12px;
      align-items:end;
    }
    .bandeja-toolbar-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }
    .bandeja-toolbar-bottom{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }
    .bandeja-pager{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      margin-top:12px;
    }
    .bandeja-pager-left,
    .bandeja-pager-right{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }
    .bandeja-row-bad{
      background:rgba(255,92,119,.10);
    }
    .bandeja-table .mono{
      font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
    }

    .exr-toast-wrap{
      position:fixed;
      right:14px;
      bottom:14px;
      z-index:10050;
      display:flex;
      flex-direction:column;
      gap:10px;
      pointer-events:none;
    }
    .exr-toast{
      min-width:260px;
      max-width:360px;
      border:1px solid var(--line);
      background:rgba(18,28,40,.96);
      box-shadow:var(--shadow);
      border-radius:14px;
      padding:12px 12px;
      font-size:13px;
      pointer-events:auto;
    }
    .exr-toast .t{ font-weight:900; margin-bottom:2px; }
    .exr-toast .m{ color:var(--muted); }

    @media (max-width: 1100px){
      .bandeja-filters{
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 720px){
      .bandeja-filters{
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="exr-pro-wrap">
    <header class="exr-pro-topbar">
      <div class="exr-pro-brand">
        <div class="exr-pro-logo">
          <img src="/assets/exr_logo.png" alt="EXR" />
        </div>
        <div style="min-width:0;">
          <h1 class="exr-pro-title">Bandeja</h1>
          <div class="exr-pro-subtitle">Guías recientes y acciones rápidas</div>
        </div>
      </div>

      <div class="exr-pro-row">
        <span id="userChip" class="badge">—</span>
        <span id="syncChip" class="badge">—</span>
        <button class="exr-pro-btn" id="btnExport" type="button">Export CSV</button>
        <button class="exr-pro-btn" id="btnRefresh" type="button">Refrescar</button>
        <button id="btnLogout" type="button" class="exr-pro-btn bad">Salir</button>
      </div>
    </header>

    <section class="exr-pro-card bandeja-card">
      <div class="bandeja-toolbar-top">
        <div class="tabs" id="tabs"></div>
        <div class="bandeja-head-note">Mostrando <b id="countTxt">0</b> guías</div>
      </div>

      <div class="hr"></div>

      <div class="bandeja-toolbar-bottom">
        <div class="tabs" id="quickChips" style="gap:6px"></div>
        <div class="bandeja-head-note">Accesos rápidos</div>
      </div>

      <div class="hr"></div>

      <div class="bandeja-filters">
        <div class="exr-pro-field">
          <label for="q">Buscar</label>
          <input class="exr-pro-input" id="q" placeholder="N° guía / nombre / teléfono" />
        </div>

        <div class="exr-pro-field">
          <label for="f_estado_log">Estado logístico</label>
          <select class="exr-pro-select" id="f_estado_log">
            <option value="">Todos</option>
            <option value="RECIBIDO_ORIGEN">RECIBIDO_ORIGEN</option>
            <option value="EN_TRANSITO">EN_TRANSITO</option>
            <option value="RECIBIDO_DESTINO">RECIBIDO_DESTINO</option>
            <option value="ENTREGADO">ENTREGADO</option>
          </select>
        </div>

        <div class="exr-pro-field">
          <label for="f_estado_pago">Estado pago</label>
<select class="exr-pro-select" id="f_estado_pago">
  <option value="">Todos</option>
  <option value="pendiente">Pendiente</option>
  <option value="pagado">Pagado</option>
  <option value="pendiente_rendicion">Pendiente rendición</option>
  <option value="rendido">Rendido</option>
  <option value="observado">Observado</option>
  <option value="pendiente_origen">Pendiente origen</option>
  <option value="pendiente_destino">Pendiente destino</option>
  <option value="cobrado_destino">Cobrado destino</option>
  <option value="no_aplica">No aplica</option>
</select>        </div>

        <div class="exr-pro-field">
          <label for="f_tipo_cobro">Tipo cobro</label>
          <select class="exr-pro-select" id="f_tipo_cobro">
            <option value="">Todos</option>
            <option value="ORIGEN">ORIGEN</option>
            <option value="DESTINO">DESTINO</option>
          </select>
        </div>

        <div class="exr-pro-field" style="min-width:220px;">
          <label>&nbsp;</label>
          <button class="exr-pro-btn ok" id="btnBuscar" type="button" style="width:100%;justify-content:center;">Buscar</button>
        </div>
      </div>
    </section>

    <section class="exr-pro-card bandeja-card">
      <div id="msg" class="muted" style="font-size:12px;margin-bottom:10px"></div>

      <div class="exr-pro-table-wrap">
        <table class="exr-pro-table bandeja-table">
          <thead>
            <tr>
              <th>N°</th>
              <th>Ruta</th>
              <th>Cliente</th>
              <th>Estados</th>
              <th>Monto</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>

      <div class="bandeja-pager">
        <div class="bandeja-pager-left">
          <span class="exr-pro-pill" id="pagerInfo">—</span>
          <span class="exr-pro-pill">Limit:
            <select class="exr-pro-select" id="limitSel" style="padding:6px 10px;border-radius:999px">
              <option value="25">25</option>
              <option value="50">50</option>
              <option value="100">100</option>
            </select>
          </span>
        </div>

        <div class="bandeja-pager-right">
          <button class="exr-pro-btn" id="btnPrev" type="button">Anterior</button>
          <button class="exr-pro-btn" id="btnNext" type="button">Siguiente</button>
        </div>
      </div>
    </section>
  </div>

  <script src="/bandeja_v2.js"></script>
</body>
</html>
