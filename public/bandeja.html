<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>EXR — Bandeja</title>
  <link rel="stylesheet" href="/css/exr_ui.css" />
  <style>
.exr-pro-wrap{
  max-width: 1620px;
}

.bandeja-grid{
  display:grid;
  gap:12px;
  margin-top:12px;
}

.bandeja-filtros{
  display:grid;
  grid-template-columns:2.2fr 1fr 1fr 1fr 120px;
  gap:10px;
  align-items:center;
}

.bandeja-tabs{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.bandeja-toolbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
}

.bandeja-toolbar-right{
  display:flex;
  gap:8px;
  align-items:center;
  flex-wrap:wrap;
}

.sync-chip.ok{ color:var(--ok); }
.sync-chip.same{ color:#ffd76a; }
.sync-chip.err{ color:var(--bad); }

.table-wrap{
  overflow:visible;
}

.table-wrap table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
}

.table-wrap th,
.table-wrap td{
  padding:8px 7px;
  border-bottom:1px solid var(--line);
  vertical-align:top;
  word-break:break-word;
  overflow-wrap:anywhere;
}

.table-wrap th{
  text-align:left;
  color:var(--muted);
  font-weight:800;
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:.2px;
}

.right{ text-align:right; }
.mono{ font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }

.pager{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  flex-wrap:wrap;
  margin-top:10px;
}

@media (max-width: 1320px){
  .exr-pro-wrap{
    max-width: 100%;
  }

  .table-wrap{
    overflow:auto;
  }

  .table-wrap table{
    min-width:1180px;
    table-layout:auto;
  }
}

@media (max-width: 1220px){
  .bandeja-filtros{
    grid-template-columns:1fr 1fr 1fr;
  }
}

@media (max-width: 900px){
  .bandeja-filtros{
    grid-template-columns:1fr;
  }
}

</style>
</head>
<body>
  <div class="exr-pro-wrap">
    <header class="exr-pro-topbar">
      <div class="exr-pro-brand">
        <div class="exr-pro-logo">
          <img src="/assets/exr-logo-blanco.png" alt="EXR" />
        </div>
        <div style="min-width:0;">
          <h1 class="exr-pro-title">Bandeja</h1>
          <div class="exr-pro-subtitle">Seguimiento operativo, cobros, entregas, alertas y trazabilidad</div>
        </div>
      </div>

      <div class="exr-pro-row" style="flex-wrap:wrap;justify-content:flex-end;">
        <span class="exr-pro-chip" id="userChip">—</span>
        <button class="exr-pro-btn" id="btnRefresh" type="button">Actualizar</button>
<!-- <button class="exr-pro-btn" id="btnExport" type="button">Exportar CSV</button> -->
         <button class="exr-pro-btn" id="btnOperador" type="button">Volver</button>
        <button class="exr-pro-btn bad" id="btnLogout" type="button">Salir</button>
      </div>
    </header>

    <section class="bandeja-grid">
      <div class="exr-pro-card">
        <div class="panel-h" style="margin-bottom:10px;">Filtros y control</div>

        <div class="bandeja-filtros">
          <input id="q" type="text" placeholder="Buscar por número / remitente / destinatario" />

          <select id="f_estado_log">
            <option value="">Estado logístico: todos</option>
            <option value="RECIBIDO_ORIGEN">RECIBIDO_ORIGEN</option>
            <option value="EN_TRANSITO">EN_TRANSITO (agrupa)</option>
            <option value="RECIBIDO_CENTRAL">RECIBIDO_CENTRAL (agrupa)</option>
            <option value="RECIBIDO_DESTINO">RECIBIDO_DESTINO (agrupa)</option>
            <option value="ENTREGADO">ENTREGADO</option>
          </select>

          <select id="f_estado_pago">
            <option value="">Estado pago: todos</option>
            <option value="pendiente_origen">pendiente_origen</option>
            <option value="pendiente_destino">pendiente_destino</option>
            <option value="cobrado_destino">cobrado_destino</option>
            <option value="pendiente_rendicion">pendiente_rendicion</option>
            <option value="rendido">rendido</option>
            <option value="observado">observado</option>
          </select>

          <select id="f_tipo_cobro">
            <option value="">Tipo cobro: todos</option>
            <option value="ORIGEN">ORIGEN</option>
            <option value="DESTINO">DESTINO</option>
          </select>

          <select id="limitSel">
            <option value="25">25 filas</option>
            <option value="50">50 filas</option>
            <option value="100">100 filas</option>
          </select>
        </div>
      </div>

      <div class="exr-pro-card">
        <div class="bandeja-toolbar">
          <div>
            <div class="panel-h" style="margin-bottom:8px;">Etapas</div>
            <div id="tabs" class="bandeja-tabs"></div>
          </div>

          <div class="bandeja-toolbar-right">
            <div id="syncChip" class="exr-pro-chip sync-chip">Sin sincronizar</div>
            <div id="countTxt" class="exr-pro-chip">0</div>
          </div>
        </div>
      </div>

      <div class="exr-pro-card">
        <div class="panel-h" style="margin-bottom:8px;">Vistas rápidas</div>
        <div id="quickChips" class="bandeja-tabs"></div>
      </div>

      <div id="msg"></div>

      <div class="exr-pro-card table-wrap">
        <table>
          <thead>
            <tr>
              <th>N° guía</th>
              <th>Ruta / fecha</th>
              <th>Cliente</th>
              <th>Estados</th>
              <th>Monto / contable</th>
              <th class="right">Acciones</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr>
              <td colspan="6" class="muted">Cargando…</td>
            </tr>
          </tbody>
        </table>

        <div class="pager">
          <div id="pagerInfo" class="exr-pro-hint">Página 1 / 1 • Total: 0</div>

          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
            <button id="btnPrev" type="button" class="exr-pro-btn">Anterior</button>
            <button id="btnNext" type="button" class="exr-pro-btn">Siguiente</button>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script src="/bandeja_v2.js"></script>
</body>
</html>
