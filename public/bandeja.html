<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>EXR • Bandeja</title>
  <link rel="stylesheet" href="/exr_ui.css">

  <style>
    :root{
      --bg:#0b0f14; --panel:#0f1620; --card:#121c28;
      --muted:#8aa0b6; --text:#e6f0ff;
      --ok:#20c997; --warn:#ffcc00; --bad:#ff5c77;
      --accent:#7c3aed; --line:rgba(255,255,255,.08);
      --shadow:0 10px 30px rgba(0,0,0,.35);
      --r:14px; --pad:14px;
      --font: ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial;
      --rowBad: rgba(255,92,119,.10);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{margin:0;font-family:var(--font);color:var(--text);background:linear-gradient(180deg,#070a0e 0%,var(--bg) 100%)}
    .exr-shell{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
    .exr-sidebar{border-right:1px solid var(--line);background:rgba(15,22,32,.9);backdrop-filter: blur(10px);padding:18px 14px;position:sticky;top:0;height:100vh}
    .exr-brand{display:flex;align-items:center;gap:10px;padding:10px 10px 16px;border-bottom:1px solid var(--line);margin-bottom:14px}
    .exr-dot{width:10px;height:10px;border-radius:50%;background:linear-gradient(135deg,var(--ok),var(--accent));box-shadow:0 0 0 4px rgba(32,201,151,.15)}
    .exr-brand h1{font-size:14px;margin:0;letter-spacing:.5px}
    .exr-nav a{display:flex;align-items:center;gap:10px;color:var(--text);text-decoration:none;padding:10px 10px;border-radius:10px;margin:4px 0;border:1px solid transparent}
    .exr-nav a:hover{background:rgba(124,58,237,.12);border-color:rgba(124,58,237,.35)}
    .exr-nav a.active{background:rgba(124,58,237,.16);border-color:rgba(124,58,237,.45)}
    .exr-nav small{color:var(--muted);display:block;margin-top:2px}
    .exr-main{padding:18px}
    .exr-topbar{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:14px 16px;border:1px solid var(--line);border-radius:var(--r);background:rgba(18,28,40,.75);box-shadow:var(--shadow);position:sticky;top:12px;z-index:5;backdrop-filter: blur(10px);margin-bottom:14px}
    .exr-title{font-weight:900;font-size:14px}
    .exr-meta{color:var(--muted);font-size:12px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .exr-card{border:1px solid var(--line);border-radius:var(--r);background:rgba(18,28,40,.65);box-shadow:var(--shadow);padding:var(--pad)}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:end}
    .col{flex:1;min-width:160px}
    label{display:block;color:var(--muted);font-size:12px;margin:0 0 6px}
    .exr-input,.exr-select{width:100%;border:1px solid var(--line);background:rgba(0,0,0,.15);color:var(--text);padding:10px 12px;border-radius:12px;outline:none}
    .exr-input:focus,.exr-select:focus{border-color:rgba(124,58,237,.6)}
    .exr-btn{appearance:none;border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--text);padding:9px 12px;border-radius:12px;cursor:pointer;font-weight:800}
    .exr-btn:hover{border-color:rgba(124,58,237,.45)}
    .exr-btn.primary{background:linear-gradient(135deg,rgba(32,201,151,.18),rgba(124,58,237,.22));border-color:rgba(124,58,237,.35)}
    .exr-btn.danger{border-color:rgba(255,92,119,.45)}
    .tabs{display:flex;gap:8px;flex-wrap:wrap}
    .tab{border:1px solid var(--line);background:rgba(255,255,255,.03);color:var(--text);padding:8px 10px;border-radius:999px;cursor:pointer;font-weight:800;font-size:12px}
    .tab.active{border-color:rgba(124,58,237,.55);background:rgba(124,58,237,.14)}
    .badge{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;border:1px solid var(--line);font-size:12px;background:rgba(255,255,255,.03)}
    .badge.ok{border-color:rgba(32,201,151,.35)}
    .badge.warn{border-color:rgba(255,204,0,.35)}
    .badge.bad{border-color:rgba(255,92,119,.35)}
    table{width:100%;border-collapse:separate;border-spacing:0 10px}
    th{color:var(--muted);font-size:12px;text-align:left;padding:0 10px}
    td{padding:12px 10px;background:rgba(0,0,0,.12);border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
    tr td:first-child{border-left:1px solid var(--line);border-radius:12px 0 0 12px}
    tr td:last-child{border-right:1px solid var(--line);border-radius:0 12px 12px 0}
    tr.bad-row td{background:var(--rowBad)}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}
    .muted{color:var(--muted)}
    .hr{height:1px;background:var(--line);margin:12px 0}
    .exr-toasts{position:fixed;right:16px;bottom:16px;display:flex;flex-direction:column;gap:10px;z-index:9999}
    .exr-toast{min-width:260px;max-width:360px;border:1px solid var(--line);background:rgba(18,28,40,.92);backdrop-filter: blur(10px);box-shadow:var(--shadow);border-radius:14px;padding:12px 12px;font-size:13px}
    .exr-toast .t{font-weight:900;margin-bottom:2px}
    .exr-toast .m{color:var(--muted)}
    .pager{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-top:12px}
    .pager .left,.pager .right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .pill{display:inline-flex;align-items:center;gap:8px;padding:8px 10px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.03);font-size:12px}
    .modal-back{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:9998;padding:18px}
    .modal{width:min(560px, 100%); border:1px solid var(--line); border-radius:16px; background:rgba(18,28,40,.95); box-shadow:var(--shadow); padding:14px}
    .modal h3{margin:0 0 8px; font-size:14px}
    .modal .actions{display:flex;gap:10px;justify-content:flex-end;margin-top:12px;flex-wrap:wrap}
    @media (max-width:1200px){.exr-shell{grid-template-columns:1fr}.exr-sidebar{position:relative;height:auto}}
  </style>
</head>
<body>
  <div class="exr-shell">
    <aside class="exr-sidebar">
      <div class="exr-brand"><div class="exr-dot"></div><h1>EXR • Operación</h1></div>
      <nav class="exr-nav">
        <a class="active" href="/bandeja.html">Bandeja<br><small>Operación diaria</small></a>
        <a href="/admin_panel.html">Admin<br><small>Sucursales / Usuarios</small></a>
        <a href="/dashboard_ejecutivo.html">Dashboard<br><small>Solo dueño</small></a>
      </nav>
      <div class="hr"></div>
      <div class="muted" style="font-size:12px;line-height:1.45">
        Atajos:<br>
        <span class="mono">Enter</span> buscar • <span class="mono">Esc</span> limpiar • <span class="mono">R</span> refrescar
      </div>
    </aside>

    <main class="exr-main">
      <div class="exr-topbar">
     <div>
      <div class="exr-title">Bandeja</div>
      <div class="muted" style="font-size:12px;margin-top:4px">
      Guías recientes + acciones rápidas
    </div>
  </div>

  <div class="exr-meta">
    <span id="userChip" class="badge">—</span>
    <span id="syncChip" class="badge">—</span>

    <button class="exr-btn" id="btnExport">Export CSV</button>
    <button class="exr-btn" id="btnRefresh">Refrescar</button>
    <button class="exr-btn danger" id="btnLogout">Salir</button>
  </div>
</div>

      <section class="exr-card" style="margin-bottom:14px">
        <div class="row" style="justify-content:space-between;align-items:center">
          <div class="tabs" id="tabs"></div>
          <div class="muted" style="font-size:12px">Mostrando <b id="countTxt">0</b> guías</div>
        </div>

        <div class="hr"></div>

        <div class="row" style="align-items:center;justify-content:space-between">
          <div class="tabs" id="quickChips" style="gap:6px"></div>
          <div class="muted" style="font-size:12px">Accesos rápidos</div>
        </div>

        <div class="hr"></div>

        <div class="row">
          <div class="col">
            <label>Buscar (server-side)</label>
            <input class="exr-input" id="q" placeholder="N° guía / nombre / teléfono" />
          </div>
          <div class="col">
            <label>Estado logístico (server-side)</label>
            <select class="exr-select" id="f_estado_log">
              <option value="">Todos</option>
              <option value="RECIBIDO_ORIGEN">RECIBIDO_ORIGEN</option>
              <option value="EN_TRANSITO">EN_TRANSITO</option>
              <option value="RECIBIDO_DESTINO">RECIBIDO_DESTINO</option>
              <option value="ENTREGADO">ENTREGADO</option>
            </select>
          </div>
          <div class="col">
            <label>Estado pago (server-side)</label>
            <select class="exr-select" id="f_estado_pago">
              <option value="">Todos</option>
              <option value="PENDIENTE">PENDIENTE</option>
              <option value="CONTRA_ENTREGA">CONTRA_ENTREGA</option>
              <option value="PAGADO">PAGADO</option>
            </select>
          </div>
          <div class="col">
            <label>Tipo cobro (server-side)</label>
            <select class="exr-select" id="f_tipo_cobro">
              <option value="">Todos</option>
              <option value="ORIGEN">ORIGEN</option>
              <option value="DESTINO">DESTINO</option>
            </select>
          </div>
          <div class="col" style="min-width:220px;flex:0">
            <button class="exr-btn primary" id="btnBuscar" style="width:100%">Buscar</button>
          </div>
        </div>
      </section>

      <section class="exr-card">
        <div id="msg" class="muted" style="font-size:12px;margin-bottom:10px"></div>

        <div style="overflow:auto">
          <table>
            <thead>
              <tr>
                <th>N°</th>
                <th>Ruta</th>
                <th>Cliente</th>
                <th>Estados</th>
                <th>Monto</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>

        <div class="pager">
          <div class="left">
            <span class="pill" id="pagerInfo">—</span>
            <span class="pill">Limit:
              <select class="exr-select" id="limitSel" style="padding:6px 10px;border-radius:999px">
                <option value="25">25</option>
                <option value="50">50</option>
                <option value="100">100</option>
              </select>
            </span>
          </div>
          <div class="right">
            <button class="exr-btn" id="btnPrev">Anterior</button>
            <button class="exr-btn" id="btnNext">Siguiente</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div class="modal-back" id="modalBack">
    <div class="modal">
      <h3>Actualizar pago</h3>
      <div class="muted" style="font-size:12px" id="modalSub">—</div>
      <div class="hr"></div>

      <div class="row">
        <div class="col">
          <label>Estado pago</label>
          <select class="exr-select" id="m_estado_pago">
            <option value="PENDIENTE">PENDIENTE</option>
            <option value="CONTRA_ENTREGA">CONTRA_ENTREGA</option>
            <option value="PAGADO">PAGADO</option>
          </select>
        </div>
        <div class="col">
          <label>Método pago (solo si PAGADO)</label>
          <select class="exr-select" id="m_metodo_pago">
            <option value="">—</option>
            <option value="EFECTIVO">EFECTIVO</option>
            <option value="MERCADO_PAGO">MERCADO_PAGO</option>
            <option value="TRANSFERENCIA">TRANSFERENCIA</option>
          </select>
        </div>
      </div>

      <div class="actions">
        <button class="exr-btn" id="m_cancel">Cancelar</button>
        <button class="exr-btn primary" id="m_save">Guardar</button>
      </div>
    </div>
  </div>

  <script>
    const EXR = (() => {
      const $ = (s, el=document) => el.querySelector(s);
      const elToasts = () => {
        let root = $(".exr-toasts");
        if(!root){ root = document.createElement("div"); root.className="exr-toasts"; document.body.appendChild(root); }
        return root;
      };
      const esc = (str) => String(str ?? "")
        .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
        .replaceAll('"',"&quot;").replaceAll("'","&#039;");
      const toast = (title, message, type="") => {
        const root = elToasts();
        const el = document.createElement("div");
        el.className="exr-toast";
        el.innerHTML = `<div class="t">${esc(title)}</div><div class="m">${esc(message)}</div>`;
        if(type==="ok") el.style.borderColor="rgba(32,201,151,.5)";
        if(type==="warn") el.style.borderColor="rgba(255,204,0,.5)";
        if(type==="bad") el.style.borderColor="rgba(255,92,119,.5)";
        root.appendChild(el);
        setTimeout(()=>el.remove(), 3200);
      };
      const badgeLog = (estado) => {
        const map = {
          RECIBIDO_ORIGEN:["Recibido origen","warn"],
          EN_TRANSITO:["En tránsito","warn"],
          RECIBIDO_DESTINO:["Recibido destino","warn"],
          ENTREGADO:["Entregado","ok"],
        };
        const [label, cls] = map[estado] || [estado||"—",""];
        return `<span class="badge ${cls}">${esc(label)}</span>`;
      };
      const badgePago = (estado, metodo) => {
        const map = {
          PENDIENTE:["Pendiente","warn"],
          CONTRA_ENTREGA:["Contra entrega","warn"],
          PAGADO:["Pagado","ok"],
        };
        const [label, cls] = map[estado] || [estado||"—",""];
        const extra = (estado==="PAGADO" && metodo) ? ` <span class="muted mono" style="font-size:11px">(${esc(metodo)})</span>` : "";
        const warn = (estado==="PAGADO" && !metodo) ? ` <span class="badge bad">SIN MÉTODO</span>` : "";
        return `<span class="badge ${cls}">${esc(label)}</span>${extra}${warn}`;
      };
      const money = (n) => Number(n ?? 0).toLocaleString("es-AR", { style:"currency", currency:"ARS" });
      const dt = (iso) => { try { return iso ? new Date(iso).toLocaleString("es-AR") : ""; } catch { return String(iso||""); } };
      return { $, toast, badgeLog, badgePago, money, esc, dt };
    })();

    const LS_TOKEN = "exr_token";
    const LS_UI = "exr_bandeja_ui_v1";
    function getToken(){ return localStorage.getItem(LS_TOKEN) || ""; }
    function logout(){ localStorage.removeItem(LS_TOKEN); location.href="/operador.html"; }

    async function api(path, opts={}){
      const token = getToken();
      const headers = Object.assign({}, opts.headers || {});
      if(token) headers["Authorization"] = "Bearer " + token;
      if(opts.json) headers["Content-Type"] = "application/json";
      const res = await fetch(path, { ...opts, headers });
      const ct = res.headers.get("content-type") || "";
      const data = ct.includes("application/json") ? await res.json().catch(()=>({})) : await res.text().catch(()=>(""));
      if(!res.ok){
        const msg = (data && data.error) ? data.error : ("HTTP " + res.status);
        throw new Error(msg);
      }
      return data;
    }

    const TABS = [
      { key:"RECIBIDO_ORIGEN", label:"Pendientes" },
      { key:"EN_TRANSITO", label:"En tránsito" },
      { key:"RECIBIDO_DESTINO", label:"En destino" },
      { key:"ENTREGADO", label:"Entregadas" },
      { key:"ALL", label:"Todas" },
    ];

    let all = [];
    let apiTotal = 0;
    let activeTab = "ALL";
    let quick = "ALL";
    let modalGuia = null;

    let page = 1;
    let limit = 25;
    let debounceTimer = null;

    // ===== UI Persistence =====
    function readUI(){
      try{
        const raw = localStorage.getItem(LS_UI);
        if(!raw) return null;
        const obj = JSON.parse(raw);
        return (obj && typeof obj === "object") ? obj : null;
      }catch{
        return null;
      }
    }
    function writeUI(patch){
      const prev = readUI() || {};
      const next = { ...prev, ...patch, saved_at: new Date().toISOString() };
      try{ localStorage.setItem(LS_UI, JSON.stringify(next)); }catch{}
    }
    function captureUI(){
      return {
        activeTab,
        quick,
        q: (document.getElementById("q").value || "").trim(),
        f_estado_log: document.getElementById("f_estado_log").value || "",
        f_estado_pago: document.getElementById("f_estado_pago").value || "",
        f_tipo_cobro: document.getElementById("f_tipo_cobro").value || "",
        page,
        limit
      };
    }
    function applyUI(state){
      if(!state) return;
      if(state.activeTab) activeTab = state.activeTab;
      if(state.quick) quick = state.quick;

      if(typeof state.page === "number" && state.page >= 1) page = state.page;
      if(typeof state.limit === "number" && [25,50,100].includes(state.limit)) limit = state.limit;

      const qEl = document.getElementById("q");
      const a = (state.q || "");
      if(qEl && a) qEl.value = a;

      const s1 = document.getElementById("f_estado_log");
      const s2 = document.getElementById("f_estado_pago");
      const s3 = document.getElementById("f_tipo_cobro");

      if(s1 && typeof state.f_estado_log === "string") s1.value = state.f_estado_log;
      if(s2 && typeof state.f_estado_pago === "string") s2.value = state.f_estado_pago;
      if(s3 && typeof state.f_tipo_cobro === "string") s3.value = state.f_tipo_cobro;

      const limSel = document.getElementById("limitSel");
      if(limSel) limSel.value = String(limit);
    }

    function renderTabs(){
      const el = document.getElementById("tabs");
      el.innerHTML = TABS.map(t => `
        <button class="tab ${t.key===activeTab?"active":""}" data-k="${t.key}">
          ${EXR.esc(t.label)}
        </button>
      `).join("");
    }

    function renderQuickChips(){
      const el = document.getElementById("quickChips");
      const chips = [
        { k:"ALL", label:"Todo" },
        { k:"SIN_METODO", label:"Pagado sin método" },
        { k:"CE", label:"Contra entrega" },
        { k:"PAGADO", label:"Pagado" },
        { k:"PENDIENTE", label:"Pendiente" },
      ];
      el.innerHTML = chips.map(c => `
        <button class="tab ${c.k===quick ? "active":""}" data-qc="${c.k}">
          ${EXR.esc(c.label)}
        </button>
      `).join("");
    }

    function rowIsBad(g){ return (g.estado_pago === "PAGADO" && !g.metodo_pago); }

    function routeLabel(g){
      const o = g.sucursal_origen_codigo || g.sucursal_origen_nombre || ("S"+g.sucursal_origen_id);
      const d = g.sucursal_destino_codigo || g.sucursal_destino_nombre || ("S"+g.sucursal_destino_id);
      const on = g.sucursal_origen_nombre ? ` <span class="muted">(${EXR.esc(g.sucursal_origen_nombre)})</span>` : "";
      const dn = g.sucursal_destino_nombre ? ` <span class="muted">(${EXR.esc(g.sucursal_destino_nombre)})</span>` : "";
      return `<div><b>${EXR.esc(o)}</b>${on} → <b>${EXR.esc(d)}</b>${dn}</div>`;
    }

    function renderPager(){
      const totalPages = Math.max(1, Math.ceil((apiTotal || 0) / limit));
      if(page > totalPages) page = totalPages;

      document.getElementById("pagerInfo").textContent =
        `Página ${page} / ${totalPages} • Total: ${apiTotal}`;

      document.getElementById("btnPrev").disabled = (page <= 1);
      document.getElementById("btnNext").disabled = (page >= totalPages);
      document.getElementById("limitSel").value = String(limit);
    }

    function render(){
      const tbody = document.getElementById("tbody");
      const msg = document.getElementById("msg");

      document.getElementById("countTxt").textContent = String(all.length);
      renderPager();

      if(!all.length){
        tbody.innerHTML = "";
        msg.textContent = "Sin guías para los filtros actuales.";
        writeUI(captureUI());
        return;
      }

      msg.textContent = `Mostrando ${all.length} en esta página (limit ${limit}).`;

      tbody.innerHTML = all.map(g => {
        const nro = EXR.esc(g.numero_guia ?? g.id);
        const ruta = `${routeLabel(g)}<div class="muted" style="font-size:12px">${EXR.esc(EXR.dt(g.created_at))}</div>`;
        const cliente = `<div><b>${EXR.esc(g.remitente_nombre || "—")}</b> <span class="muted">→</span> <b>${EXR.esc(g.destinatario_nombre || "—")}</b></div>
                         <div class="muted" style="font-size:12px">${EXR.esc(g.remitente_telefono || "")} • ${EXR.esc(g.destinatario_telefono || "")}</div>`;
        const estados = `<div style="display:flex;gap:8px;flex-wrap:wrap">${EXR.badgeLog(g.estado_logistico)} ${EXR.badgePago(g.estado_pago, g.metodo_pago)}</div>`;
        const monto = `<div><b>${EXR.money(g.monto_total ?? 0)}</b></div><div class="muted" style="font-size:12px">${EXR.esc(g.tipo_cobro || "")}</div>`;
        const acciones = `
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button class="exr-btn" data-act="detalle" data-id="${g.id}">Detalle</button>
            <button class="exr-btn" data-act="etiqueta" data-id="${g.id}">Etiqueta</button>
            <button class="exr-btn primary" data-act="pago" data-id="${g.id}">Pago</button>
            ${rowIsBad(g) ? `<button class="exr-btn danger" data-act="arreglar" data-id="${g.id}">Arreglar</button>` : ``}
          </div>
        `;
        return `<tr class="${rowIsBad(g) ? "bad-row" : ""}">
          <td class="mono"><b>${nro}</b></td>
          <td>${ruta}</td>
          <td>${cliente}</td>
          <td>${estados}</td>
          <td>${monto}</td>
          <td>${acciones}</td>
        </tr>`;
      }).join("");

      writeUI(captureUI());
    }

    function buildServerFilters(){
      const selEstLog = document.getElementById("f_estado_log").value;
      const estado_logistico = (activeTab !== "ALL") ? activeTab : (selEstLog || "");

      let estado_pago = document.getElementById("f_estado_pago").value || "";
      let tipo_cobro = document.getElementById("f_tipo_cobro").value || "";
      let sin_metodo = 0;

      if(quick === "SIN_METODO"){
        sin_metodo = 1;
        estado_pago = "PAGADO";
      } else if(quick === "PAGADO"){
        estado_pago = "PAGADO";
      } else if(quick === "PENDIENTE"){
        estado_pago = "PENDIENTE";
      } else if(quick === "CE"){
        if(!estado_pago) estado_pago = "CONTRA_ENTREGA";
        if(!tipo_cobro) tipo_cobro = "DESTINO";
      }

      return { estado_logistico, estado_pago, tipo_cobro, sin_metodo };
    }

    // ===== EXPORT CSV (A: todo lo filtrado) =====
    function csvCell(v){
      const s = String(v ?? "");
      const needs = /[;\n\r"]/g.test(s);
      const escaped = s.replaceAll('"','""');
      return needs ? `"${escaped}"` : escaped;
    }

    function toCSV(rows){
      const cols = [
        ["numero_guia","N° Guía"],
        ["created_at","Fecha"],
        ["sucursal_origen_codigo","Origen"],
        ["sucursal_destino_codigo","Destino"],
        ["sucursal_origen_nombre","Origen (nombre)"],
        ["sucursal_destino_nombre","Destino (nombre)"],
        ["remitente_nombre","Remitente"],
        ["remitente_telefono","Tel Rem"],
        ["destinatario_nombre","Destinatario"],
        ["destinatario_telefono","Tel Dest"],
        ["estado_logistico","Estado Log"],
        ["estado_pago","Estado Pago"],
        ["metodo_pago","Método Pago"],
        ["tipo_cobro","Tipo Cobro"],
        ["monto_total","Monto Total"]
      ];

      const header = cols.map(c => csvCell(c[1])).join(";");
      const lines = rows.map(r => cols.map(c => csvCell(r?.[c[0]])).join(";"));
      return [header, ...lines].join("\n");
    }

    async function exportCSVAll(){
      const q = (document.getElementById("q").value || "").trim();
      const f = buildServerFilters();

      const url =
        `/interno/bandeja?export=1` +
        `&q=${encodeURIComponent(q)}` +
        `&estado_logistico=${encodeURIComponent(f.estado_logistico || "")}` +
        `&estado_pago=${encodeURIComponent(f.estado_pago || "")}` +
        `&tipo_cobro=${encodeURIComponent(f.tipo_cobro || "")}` +
        `&sin_metodo=${encodeURIComponent(String(f.sin_metodo || 0))}`;

      const data = await api(url);
      const rows = Array.isArray(data) ? data : (data?.guias || []);

      const csv = toCSV(rows);
      const blob = new Blob([csv], { type:"text/csv;charset=utf-8" });

      const a = document.createElement("a");
      const stamp = new Date().toISOString().slice(0,19).replaceAll(":","-");
      a.href = URL.createObjectURL(blob);
      a.download = `exr_bandeja_${stamp}.csv`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(a.href);

      EXR.toast("Export listo", `Filas: ${rows.length}`, "ok");
    }

    async function load(){
      try{
        const me = await api("/test-auth");
        const u = me?.user || me || {};
        document.getElementById("userChip").textContent =
          `${u.usuario || "usuario"} • ${u.rol || "ROL"} ${u.sucursal_id ? ("• S" + u.sucursal_id) : "• Global"}`;
      }catch(e){
        return logout();
      }

      try{
        document.getElementById("msg").textContent = "Cargando…";

        const q = (document.getElementById("q").value || "").trim();
        const offset = (page - 1) * limit;

        const f = buildServerFilters();
        const url =
          `/interno/bandeja?limit=${encodeURIComponent(limit)}&offset=${encodeURIComponent(offset)}` +
          `&q=${encodeURIComponent(q)}` +
          `&estado_logistico=${encodeURIComponent(f.estado_logistico || "")}` +
          `&estado_pago=${encodeURIComponent(f.estado_pago || "")}` +
          `&tipo_cobro=${encodeURIComponent(f.tipo_cobro || "")}` +
          `&sin_metodo=${encodeURIComponent(String(f.sin_metodo || 0))}`;

        const data = await api(url);
        all = Array.isArray(data) ? data : (data?.guias || []);
        apiTotal = Number(data?.total ?? all.length ?? 0);

        renderTabs();
        renderQuickChips();
        render();
      }catch(e){
        document.getElementById("msg").textContent = "Error: " + e.message;
        EXR.toast("Error", e.message, "bad");
      }
    }

    function openPagoModal(guia){
      modalGuia = guia;
      document.getElementById("modalSub").textContent =
        `Guía ${guia.numero_guia || guia.id} • ${guia.remitente_nombre || "—"} → ${guia.destinatario_nombre || "—"}`;
      document.getElementById("m_estado_pago").value = guia.estado_pago || "PENDIENTE";
      document.getElementById("m_metodo_pago").value = guia.metodo_pago || "";
      document.getElementById("modalBack").style.display = "flex";
      document.getElementById("m_metodo_pago").disabled = (document.getElementById("m_estado_pago").value !== "PAGADO");
    }
    function closePagoModal(){
      document.getElementById("modalBack").style.display = "none";
      modalGuia = null;
    }

    document.getElementById("m_estado_pago").addEventListener("change", (e) => {
      const v = e.target.value;
      const mp = document.getElementById("m_metodo_pago");
      mp.disabled = (v !== "PAGADO");
      if(v !== "PAGADO") mp.value = "";
    });

    document.getElementById("m_cancel").addEventListener("click", closePagoModal);
    document.getElementById("modalBack").addEventListener("click", (e) => {
      if(e.target.id === "modalBack") closePagoModal();
    });

    document.getElementById("m_save").addEventListener("click", async () => {
      if(!modalGuia) return;

      const estado_pago = document.getElementById("m_estado_pago").value;
      const metodo_pago = document.getElementById("m_metodo_pago").value;

      if(estado_pago === "PAGADO" && !metodo_pago){
        EXR.toast("Falta método", "Si está PAGADO, seleccioná EFECTIVO / MP / TRANSFERENCIA.", "warn");
        return;
      }

      try{
        await api("/guias/pago", {
          method:"POST",
          json:true,
          body: JSON.stringify({
            guia_id: modalGuia.id,
            estado_pago,
            metodo_pago: estado_pago === "PAGADO" ? metodo_pago : null
          })
        });
        EXR.toast("Pago guardado", `Guía ${modalGuia.numero_guia || modalGuia.id}`, "ok");
        closePagoModal();
        await load();
      }catch(e){
        EXR.toast("Error", e.message, "bad");
      }
    });

    // Delegación tabla
    document.getElementById("tbody").addEventListener("click", (e) => {
      const btn = e.target.closest("button[data-act]");
      if(!btn) return;
      const act = btn.dataset.act;
      const id = btn.dataset.id;
      if(!id) return;

      const guia = all.find(x => String(x.id) === String(id));
      if(!guia) return;

      if(act === "etiqueta"){
        window.open(`/interno/etiqueta/${encodeURIComponent(id)}?b=1`, "_blank");
        return;
      }
      if(act === "detalle"){
        location.href = `/detalle.html?id=${encodeURIComponent(id)}`;
        return;
      }
      if(act === "pago"){
        openPagoModal(guia);
        return;
      }
      if(act === "arreglar"){
        openPagoModal(guia);
        EXR.toast("Atención", "Esta guía está PAGADA sin método. Corregilo acá.", "warn");
        return;
      }
    });

    // Tabs y chips (server-side)
    document.getElementById("tabs").addEventListener("click", (e) => {
      const btn = e.target.closest(".tab");
      if(!btn) return;
      activeTab = btn.dataset.k || "ALL";
      page = 1;
      writeUI(captureUI());
      load();
    });

    document.getElementById("quickChips").addEventListener("click", (e) => {
      const btn = e.target.closest(".tab");
      if(!btn) return;
      quick = btn.dataset.qc || "ALL";
      page = 1;
      writeUI(captureUI());
      load();
    });

    document.getElementById("btnRefresh").addEventListener("click", () => {
      writeUI(captureUI());
      load();
    });
    document.getElementById("btnLogout").addEventListener("click", logout);

    document.getElementById("btnBuscar").addEventListener("click", () => {
      page = 1;
      writeUI(captureUI());
      load();
    });

    document.getElementById("btnExport").addEventListener("click", () => {
      exportCSVAll().catch(e => EXR.toast("Error export", e.message, "bad"));
    });

    <span id="syncChip" class="badge">—</span>

    ["f_estado_log","f_estado_pago","f_tipo_cobro"].forEach(id => {
      document.getElementById(id).addEventListener("change", () => {
        page = 1;
        writeUI(captureUI());
        load();
      });
    });

    // Debounce search (server-side)
    document.getElementById("q").addEventListener("input", () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        page = 1;
        writeUI(captureUI());
        load();
      }, 350);
    });

    document.getElementById("q").addEventListener("keydown", (e) => {
      if(e.key === "Enter"){
        clearTimeout(debounceTimer);
        page = 1;
        writeUI(captureUI());
        load();
      }
      if(e.key === "Escape"){
        clearTimeout(debounceTimer);
        e.target.value = "";
        document.getElementById("f_estado_log").value = "";
        document.getElementById("f_estado_pago").value = "";
        document.getElementById("f_tipo_cobro").value = "";
        activeTab = "ALL";
        quick = "ALL";
        page = 1;
        writeUI(captureUI());
        renderTabs(); renderQuickChips();
        load();
      }
    });

    document.getElementById("btnPrev").addEventListener("click", () => {
      if(page > 1){ page--; writeUI(captureUI()); load(); }
    });

    document.getElementById("btnNext").addEventListener("click", () => {
      const totalPages = Math.max(1, Math.ceil((apiTotal || 0) / limit));
      if(page < totalPages){ page++; writeUI(captureUI()); load(); }
    });

    document.getElementById("limitSel").addEventListener("change", (e) => {
      limit = parseInt(e.target.value, 10) || 25;
      page = 1;
      writeUI(captureUI());
      load();
    });

    document.addEventListener("keydown", (e) => {
      if(e.key.toLowerCase() === "r"){ writeUI(captureUI()); load(); }
    });

    // Boot: restaurar UI y cargar
    renderTabs();
    renderQuickChips();
    applyUI(readUI());
    renderTabs();
    renderQuickChips();
    writeUI(captureUI());
    load();
  </script>
</body>
</html>
