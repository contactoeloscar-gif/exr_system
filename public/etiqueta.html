<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Etiqueta | EXR</title>

  <style>
    /* Tamaño etiqueta 10x15 cm */
    @page { size: 10cm 15cm; margin: 0; }
    html, body { width: 10cm; height: 15cm; margin: 0; padding: 0; background: #fff; color:#000; }

    .label{
      width: 10cm; height: 15cm;
      box-sizing: border-box;
      padding: 8mm;
      display:flex; flex-direction:column;
      gap: 6mm;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
    }

    .top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 8mm;
    }

    .logo{
      font-weight: 900;
      font-size: 22px;
      letter-spacing: .08em;
    }
    .logo span{ font-weight:900; }
    .brandline{
      font-size: 11px;
      opacity: .8;
      margin-top: 2px;
    }

    .qr{
      width: 32mm; height: 32mm;
      border: 1px solid #000;
      display:flex; align-items:center; justify-content:center;
      padding: 2mm;
      box-sizing: border-box;
    }
    .qr img{ width:100%; height:100%; object-fit:contain; }

    .num{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 16px;
      font-weight: 800;
      border: 2px solid #000;
      padding: 3mm;
      text-align:center;
    }

    .route{
      border: 2px solid #000;
      padding: 4mm;
    }
    .route .k{ font-size: 11px; opacity:.75; margin-bottom: 2mm; }
    .route .v{ font-size: 16px; font-weight: 900; }
    .route .arrow{ font-size: 14px; margin: 2mm 0; text-align:center; }

    .meta{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 4mm;
      margin-top: auto;
    }
    .box{
      border: 1px solid #000;
      padding: 3mm;
    }
    .box .k{ font-size: 10px; opacity:.75; margin-bottom: 1.5mm; }
    .box .v{ font-size: 14px; font-weight: 800; }

    .fragil{
      border: 3px solid #000;
      padding: 3mm;
      text-align:center;
      font-weight: 900;
      font-size: 16px;
      display:none;
    }
    .fragil.on{ display:block; }

    .foot{
      font-size: 10px;
      opacity: .75;
      display:flex;
      justify-content:space-between;
      gap: 4mm;
      margin-top: 2mm;
    }

    .muted { opacity: .85; }

  .clamp2{
    display: -webkit-box;
    -webkit-box-orient: vertical;
    -webkit-line-clamp: 2;
    overflow: hidden;
    text-overflow: ellipsis;
  }
    /* No mostrar botones en impresión (si agregás) */
    @media print { .no-print{ display:none !important; } }
  </style>
</head>
<body>
  <div class="label">
    <div class="top">
      <div>
        <div class="logo">EXR</div>
        <div class="brandline">El amigo de tu encomienda</div>
      </div>
      <div class="qr"><img id="qrImg" alt="QR" /></div>
    </div>

    <div class="num" id="numero">—</div>
    <div class="bultoLine" id="bultoLine" style="text-align:center;font-weight:900;font-size:14px;letter-spacing:.04em;margin-top:-2mm;"></div>

    <div class="route">
      <div class="k">ORIGEN</div>
      <div class="v" id="origen">—</div>
      <div class="arrow">⬇</div>
      <div class="k">DESTINO</div>
      <div class="v" id="destino">—</div>
    </div>

    <!-- ✅ PUNTO 4 (PRO): DESTINATARIO (nombre + tel + dirección si existe) -->
    <div class="box" id="destBox" style="border:2px solid #000;padding:3mm;">
      <div class="k">DESTINATARIO</div>
      <div class="v clamp2" id="destNombre" style="font-size:14px;font-weight:900;">—</div>
      <div class="muted clamp2" id="destTel" style="font-size:11px;margin-top:1mm;"></div>
      <div class="muted clamp2" id="destDir" style="font-size:11px;margin-top:1mm;"></div>
    </div>

    <div class="fragil" id="fragilBox">FRÁGIL</div>

    <div class="meta">
      <div class="box">
        <div class="k">BULTOS</div>
        <div class="v" id="bultos">—</div>
      </div>
      <div class="box">
        <div class="k">PAGO</div>
        <div class="v" id="pago">—</div>
      </div>
      <div class="box">
        <div class="k">ESTADO</div>
        <div class="v" id="estado">—</div>
      </div>
      <div class="box">
        <div class="k">FECHA</div>
        <div class="v" id="fecha">—</div>
      </div>
    </div>

    <div class="foot">
      <div id="suc">—</div>
      <div>EXR</div>
    </div>
  </div>

  <script src="/etiqueta.js?v=1002"></script>
</body>
</html>
