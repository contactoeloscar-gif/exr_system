<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>EXR • Admin</title>
  <style>
    :root{
      --bg:#0b0f14; --panel:#0f1620; --card:#121c28;
      --muted:#8aa0b6; --text:#e6f0ff;
      --ok:#20c997; --warn:#ffcc00; --bad:#ff5c77;
      --accent:#7c3aed; --line:rgba(255,255,255,.08);
      --shadow:0 10px 30px rgba(0,0,0,.35);
      --r:14px; --pad:14px;
      --font: ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{margin:0;font-family:var(--font);color:var(--text);background:linear-gradient(180deg,#070a0e 0%,var(--bg) 100%)}
    .exr-shell{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
    .exr-sidebar{border-right:1px solid var(--line);background:rgba(15,22,32,.9);backdrop-filter: blur(10px);padding:18px 14px;position:sticky;top:0;height:100vh}
    .exr-brand{display:flex;align-items:center;gap:10px;padding:10px 10px 16px;border-bottom:1px solid var(--line);margin-bottom:14px}
    .exr-dot{width:10px;height:10px;border-radius:50%;background:linear-gradient(135deg,var(--ok),var(--accent));box-shadow:0 0 0 4px rgba(32,201,151,.15)}
    .exr-brand h1{font-size:14px;margin:0;letter-spacing:.5px}
    .exr-nav a{display:flex;align-items:center;gap:10px;color:var(--text);text-decoration:none;padding:10px 10px;border-radius:10px;margin:4px 0;border:1px solid transparent}
    .exr-nav a:hover{background:rgba(124,58,237,.12);border-color:rgba(124,58,237,.35)}
    .exr-nav a.active{background:rgba(124,58,237,.16);border-color:rgba(124,58,237,.45)}
    .exr-nav small{color:var(--muted);display:block;margin-top:2px}
    .exr-main{padding:18px}
    .exr-topbar{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:14px 16px;border:1px solid var(--line);border-radius:var(--r);background:rgba(18,28,40,.75);box-shadow:var(--shadow);position:sticky;top:12px;z-index:5;backdrop-filter: blur(10px);margin-bottom:14px}
    .exr-title{font-weight:900;font-size:14px}
    .exr-meta{color:var(--muted);font-size:12px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .exr-card{border:1px solid var(--line);border-radius:var(--r);background:rgba(18,28,40,.65);box-shadow:var(--shadow);padding:var(--pad)}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:end}
    .col{flex:1;min-width:180px}
    label{display:block;color:var(--muted);font-size:12px;margin:0 0 6px}
    .exr-input,.exr-select{width:100%;border:1px solid var(--line);background:rgba(0,0,0,.15);color:var(--text);padding:10px 12px;border-radius:12px;outline:none}
    .exr-input:focus,.exr-select:focus{border-color:rgba(124,58,237,.6)}
    .exr-btn{appearance:none;border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--text);padding:9px 12px;border-radius:12px;cursor:pointer;font-weight:900}
    .exr-btn:hover{border-color:rgba(124,58,237,.45)}
    .exr-btn.primary{background:linear-gradient(135deg,rgba(32,201,151,.18),rgba(124,58,237,.22));border-color:rgba(124,58,237,.35)}
    .exr-btn.danger{border-color:rgba(255,92,119,.45)}
    .badge{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;border:1px solid var(--line);font-size:12px;background:rgba(255,255,255,.03)}
    .badge.ok{border-color:rgba(32,201,151,.35)}
    .badge.warn{border-color:rgba(255,204,0,.35)}
    .badge.bad{border-color:rgba(255,92,119,.35)}
    .tabs{display:flex;gap:8px;flex-wrap:wrap}
    .tab{border:1px solid var(--line);background:rgba(255,255,255,.03);color:var(--text);padding:8px 10px;border-radius:999px;cursor:pointer;font-weight:900;font-size:12px}
    .tab.active{border-color:rgba(124,58,237,.55);background:rgba(124,58,237,.14)}
    table{width:100%;border-collapse:separate;border-spacing:0 10px}
    th{color:var(--muted);font-size:12px;text-align:left;padding:0 10px}
    td{padding:12px 10px;background:rgba(0,0,0,.12);border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
    tr td:first-child{border-left:1px solid var(--line);border-radius:12px 0 0 12px}
    tr td:last-child{border-right:1px solid var(--line);border-radius:0 12px 12px 0}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}
    .muted{color:var(--muted)}
    .hr{height:1px;background:var(--line);margin:12px 0}
    .exr-toasts{position:fixed;right:16px;bottom:16px;display:flex;flex-direction:column;gap:10px;z-index:9999}
    .exr-toast{min-width:260px;max-width:360px;border:1px solid var(--line);background:rgba(18,28,40,.92);backdrop-filter: blur(10px);box-shadow:var(--shadow);border-radius:14px;padding:12px 12px;font-size:13px}
    .exr-toast .t{font-weight:900;margin-bottom:2px}
    .exr-toast .m{color:var(--muted)}
    @media (max-width: 1200px){
      .exr-shell{grid-template-columns:1fr}
      .exr-sidebar{position:relative;height:auto}
    }
  </style>
</head>
<body>
  <div class="exr-shell">
    <aside class="exr-sidebar">
      <div class="exr-brand">
        <div class="exr-dot"></div>
        <h1>EXR • Admin</h1>
      </div>
      <nav class="exr-nav">
        <a href="/bandeja.html">Bandeja<br><small>Operación diaria</small></a>
        <a class="active" href="/admin_panel.html">Admin<br><small>Sucursales / Usuarios</small></a>
        <a href="/dashboard_ejecutivo.html">Dashboard<br><small>Solo dueño</small></a>
      </nav>
      <div class="hr"></div>
      <div class="muted" style="font-size:12px;line-height:1.45">
        OWNER/ADMIN únicamente. ADMIN no crea OWNER (y recomendado: no crea ADMIN).
      </div>
    </aside>

    <main class="exr-main">
      <div class="exr-topbar">
        <div>
          <div class="exr-title">Admin</div>
          <div class="muted" style="font-size:12px;margin-top:4px">Sucursales + Usuarios</div>
        </div>
        <div class="exr-meta">
          <span id="userChip" class="badge">—</span>
          <button class="exr-btn" id="btnReload">Recargar</button>
          <button class="exr-btn danger" id="btnLogout">Salir</button>
        </div>
      </div>

      <section class="exr-card" style="margin-bottom:14px">
        <div class="tabs">
          <button class="tab active" id="tabSuc">Sucursales</button>
          <button class="tab" id="tabUsr">Usuarios</button>
        </div>
        <div class="hr"></div>

        <!-- SUCURSALES -->
        <div id="paneSuc">
          <div class="row">
            <div class="col">
              <label>Nombre</label>
              <input class="exr-input" id="s_nombre" placeholder="Ej: Punto Venta Palermo" />
            </div>
            <div class="col">
              <label>Código (único)</label>
              <input class="exr-input mono" id="s_codigo" placeholder="Ej: PV_PALERMO" />
            </div>
            <div class="col">
              <label>Tipo</label>
              <select class="exr-select" id="s_tipo">
                <option value="SUCURSAL">SUCURSAL (punto)</option>
                <option value="DEPOSITO">DEPOSITO (central)</option>
              </select>
            </div>
            <div class="col">
              <label>Dirección</label>
              <input class="exr-input" id="s_direccion" placeholder="Calle y número" />
            </div>
            <div class="col" style="min-width:220px;flex:0">
              <button class="exr-btn primary" id="btnCrearSucursal" style="width:100%">Crear sucursal</button>
            </div>
          </div>

          <div class="hr"></div>

          <div class="muted" id="s_msg" style="font-size:12px;margin-bottom:10px"></div>
          <div style="overflow:auto">
            <table>
              <thead>
                <tr>
                  <th>ID</th><th>Nombre</th><th>Código</th><th>Tipo</th><th>Dirección</th><th>Activa</th>
                </tr>
              </thead>
              <tbody id="s_tbody"></tbody>
            </table>
          </div>
        </div>

        <!-- USUARIOS -->
        <div id="paneUsr" style="display:none">
          <div class="row">
            <div class="col">
              <label>Nombre</label>
              <input class="exr-input" id="u_nombre" placeholder="Nombre completo" />
            </div>
            <div class="col">
              <label>Email</label>
              <input class="exr-input" id="u_email" placeholder="mail@..." />
            </div>
            <div class="col">
              <label>Usuario (login)</label>
              <input class="exr-input mono" id="u_usuario" placeholder="usuario" />
            </div>
            <div class="col">
              <label>Rol</label>
              <select class="exr-select" id="u_rol">
                <option value="OPERADOR">OPERADOR</option>
                <option value="ENCARGADO">ENCARGADO</option>
                <option value="ADMIN">ADMIN</option>
                <option value="OWNER">OWNER</option>
              </select>
            </div>
            <div class="col">
              <label>Sucursal (requerida salvo OWNER)</label>
              <select class="exr-select" id="u_sucursal"></select>
            </div>
            <div class="col">
              <label>Contraseña</label>
              <input class="exr-input" id="u_pass" type="password" placeholder="••••••••" />
            </div>
            <div class="col" style="min-width:220px;flex:0">
              <button class="exr-btn primary" id="btnCrearUsuario" style="width:100%">Crear usuario</button>
            </div>
          </div>

          <div class="hr"></div>

          <div class="muted" id="u_msg" style="font-size:12px;margin-bottom:10px"></div>
          <div style="overflow:auto">
            <table>
              <thead>
                <tr>
                  <th>ID</th><th>Usuario</th><th>Rol</th><th>Sucursal</th><th>Email</th><th>Activo</th><th>Acción</th>
                </tr>
              </thead>
              <tbody id="u_tbody"></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    // ===== UI KIT =====
    const EXR = (() => {
      const $ = (s, el=document) => el.querySelector(s);
      const elToasts = () => {
        let root = $(".exr-toasts");
        if(!root){ root = document.createElement("div"); root.className="exr-toasts"; document.body.appendChild(root); }
        return root;
      };
      const esc = (str) => String(str ?? "")
        .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
        .replaceAll('"',"&quot;").replaceAll("'","&#039;");
      const toast = (title, message, type="") => {
        const root = elToasts();
        const el = document.createElement("div");
        el.className="exr-toast";
        el.innerHTML = `<div class="t">${esc(title)}</div><div class="m">${esc(message)}</div>`;
        if(type==="ok") el.style.borderColor="rgba(32,201,151,.5)";
        if(type==="warn") el.style.borderColor="rgba(255,204,0,.5)";
        if(type==="bad") el.style.borderColor="rgba(255,92,119,.5)";
        root.appendChild(el);
        setTimeout(()=>el.remove(), 3200);
      };
      return { $, esc, toast };
    })();

    // ===== AUTH + API =====
    const LS_TOKEN = "exr_token";
    function getToken(){ return localStorage.getItem(LS_TOKEN) || ""; }
    function logout(){ localStorage.removeItem(LS_TOKEN); location.href="/operador.html"; }
    async function api(path, opts={}){
      const token = getToken();
      const headers = Object.assign({}, opts.headers || {});
      if(token) headers["Authorization"] = "Bearer " + token;
      if(opts.json) headers["Content-Type"] = "application/json";
      const res = await fetch(path, { ...opts, headers });
      const ct = res.headers.get("content-type") || "";
      const data = ct.includes("application/json") ? await res.json().catch(()=>({})) : await res.text().catch(()=>(""));
      if(!res.ok){
        const msg = (data && data.error) ? data.error : ("HTTP " + res.status);
        throw new Error(msg);
      }
      return data;
    }

    let sucursales = [];
    let usuarios = [];

    // Tabs
    const tabSuc = document.getElementById("tabSuc");
    const tabUsr = document.getElementById("tabUsr");
    const paneSuc = document.getElementById("paneSuc");
    const paneUsr = document.getElementById("paneUsr");
    function setTab(which){
      const suc = which === "s";
      tabSuc.classList.toggle("active", suc);
      tabUsr.classList.toggle("active", !suc);
      paneSuc.style.display = suc ? "block" : "none";
      paneUsr.style.display = suc ? "none" : "block";
    }
    tabSuc.addEventListener("click", ()=>setTab("s"));
    tabUsr.addEventListener("click", ()=>setTab("u"));

    function renderSuc(){
      const tb = document.getElementById("s_tbody");
      if(!sucursales.length){
        tb.innerHTML = `<tr><td colspan="6" class="muted">Sin sucursales.</td></tr>`;
        return;
      }
      tb.innerHTML = sucursales.map(s => `
        <tr>
          <td class="mono"><b>${s.id}</b></td>
          <td><b>${EXR.esc(s.nombre||"—")}</b></td>
          <td class="mono">${EXR.esc(s.codigo||"—")}</td>
          <td>${EXR.esc(s.tipo||"—")}</td>
          <td>${EXR.esc(s.direccion||"")}</td>
          <td>${s.activa ? `<span class="badge ok">Activa</span>` : `<span class="badge bad">Inactiva</span>`}</td>
        </tr>
      `).join("");
    }

    function fillSucSelect(){
      const sel = document.getElementById("u_sucursal");
      const opts = [`<option value="">—</option>`]
        .concat(sucursales.map(s => `<option value="${s.id}">${EXR.esc(s.nombre)} (${EXR.esc(s.codigo)})</option>`));
      sel.innerHTML = opts.join("");
    }

    function renderUsr(){
      const tb = document.getElementById("u_tbody");
      if(!usuarios.length){
        tb.innerHTML = `<tr><td colspan="7" class="muted">Sin usuarios.</td></tr>`;
        return;
      }
      const sucMap = new Map(sucursales.map(s => [String(s.id), s]));
      tb.innerHTML = usuarios.map(u => {
        const s = u.sucursal_id ? sucMap.get(String(u.sucursal_id)) : null;
        const sucTxt = u.sucursal_id ? `${s?.nombre || "Sucursal"} (#${u.sucursal_id})` : "— (global)";
        const activo = u.activo ? `<span class="badge ok">Activo</span>` : `<span class="badge bad">Bloqueado</span>`;
        const btn = u.activo
          ? `<button class="exr-btn danger" data-act="toggle" data-id="${u.id}" data-next="0">Desactivar</button>`
          : `<button class="exr-btn" data-act="toggle" data-id="${u.id}" data-next="1">Activar</button>`;
        return `
          <tr>
            <td class="mono"><b>${u.id}</b></td>
            <td class="mono">${EXR.esc(u.usuario||"—")}</td>
            <td><span class="badge">${EXR.esc(u.rol||"—")}</span></td>
            <td>${EXR.esc(sucTxt)}</td>
            <td>${EXR.esc(u.email||"")}</td>
            <td>${activo}</td>
            <td>${btn}</td>
          </tr>
        `;
      }).join("");

      tb.querySelectorAll("button[data-act='toggle']").forEach(b => {
        b.addEventListener("click", async () => {
          const id = b.dataset.id;
          const next = b.dataset.next === "1";
          try{
            await api(`/admin/usuarios/${id}/activo`, {
              method:"PATCH",
              json:true,
              body: JSON.stringify({ activo: next })
            });
            EXR.toast("OK", `Usuario #${id} ${next ? "activado" : "desactivado"}`, "ok");
            await loadAll();
          }catch(e){
            EXR.toast("Error", e.message, "bad");
          }
        });
      });
    }

    async function loadAll(){
      // Validar sesión
      try{
        const me = await api("/test-auth");
        const u = me?.user || me || {};
        document.getElementById("userChip").textContent =
          `${u.usuario||"usuario"} • ${u.rol||"ROL"} ${u.sucursal_id ? ("• S"+u.sucursal_id) : "• Global"}`;
      }catch(e){
        return logout();
      }

      // Sucursales
      try{
        document.getElementById("s_msg").textContent = "Cargando sucursales…";
        sucursales = await api("/admin/sucursales");
        document.getElementById("s_msg").textContent = `Sucursales: ${sucursales.length}`;
        renderSuc();
        fillSucSelect();
      }catch(e){
        document.getElementById("s_msg").textContent = "Error: " + e.message;
        EXR.toast("Error", e.message, "bad");
      }

      // Usuarios
      try{
        document.getElementById("u_msg").textContent = "Cargando usuarios…";
        usuarios = await api("/admin/usuarios");
        document.getElementById("u_msg").textContent = `Usuarios: ${usuarios.length}`;
        renderUsr();
      }catch(e){
        document.getElementById("u_msg").textContent = "Error: " + e.message;
        EXR.toast("Error", e.message, "bad");
      }
    }

    // Crear sucursal
    document.getElementById("btnCrearSucursal").addEventListener("click", async () => {
      const nombre = document.getElementById("s_nombre").value.trim();
      const codigo = document.getElementById("s_codigo").value.trim();
      const tipo = document.getElementById("s_tipo").value;
      const direccion = document.getElementById("s_direccion").value.trim();

      if(!nombre || !codigo){
        EXR.toast("Faltan datos", "Nombre y código son obligatorios.", "warn");
        return;
      }

      try{
        await api("/admin/sucursales", {
          method:"POST",
          json:true,
          body: JSON.stringify({ nombre, codigo, tipo, direccion })
        });
        EXR.toast("OK", "Sucursal creada", "ok");
        document.getElementById("s_nombre").value="";
        document.getElementById("s_codigo").value="";
        document.getElementById("s_direccion").value="";
        await loadAll();
      }catch(e){
        EXR.toast("Error", e.message, "bad");
      }
    });

    // Crear usuario
    function enforceSucursalRule(){
      const rol = document.getElementById("u_rol").value;
      const sel = document.getElementById("u_sucursal");
      const must = (rol !== "OWNER");
      sel.disabled = !must;
      if(!must) sel.value = "";
    }
    document.getElementById("u_rol").addEventListener("change", enforceSucursalRule);

    document.getElementById("btnCrearUsuario").addEventListener("click", async () => {
      const nombre = document.getElementById("u_nombre").value.trim();
      const email = document.getElementById("u_email").value.trim();
      const usuario = document.getElementById("u_usuario").value.trim();
      const rol = document.getElementById("u_rol").value;
      const sucursal_id_raw = document.getElementById("u_sucursal").value;
      const password = document.getElementById("u_pass").value;

      if(!usuario || !password){
        EXR.toast("Faltan datos", "Usuario y contraseña son obligatorios.", "warn");
        return;
      }
      const sucursal_id = sucursal_id_raw ? Number(sucursal_id_raw) : null;
      if(rol !== "OWNER" && !sucursal_id){
        EXR.toast("Sucursal requerida", "Para roles no-OWNER asigná sucursal.", "warn");
        return;
      }

      try{
        await api("/admin/usuarios", {
          method:"POST",
          json:true,
          body: JSON.stringify({ nombre, email, usuario, rol, sucursal_id, password })
        });
        EXR.toast("OK", "Usuario creado", "ok");
        document.getElementById("u_nombre").value="";
        document.getElementById("u_email").value="";
        document.getElementById("u_usuario").value="";
        document.getElementById("u_pass").value="";
        enforceSucursalRule();
        await loadAll();
      }catch(e){
        EXR.toast("Error", e.message, "bad");
      }
    });

    document.getElementById("btnReload").addEventListener("click", loadAll);
    document.getElementById("btnLogout").addEventListener("click", logout);

    enforceSucursalRule();
    loadAll();
  </script>
</body>
</html>
